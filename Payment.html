<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Page</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

     <header>
    <div class="logo">LevelUp</div>
    <head></head><nav>
      <ul>
       <li><a href="Home.html">Home</a></li>
        <li><a href="library.html">Library</a></li>
        <li><a href="buyKeys.html">BuyKeys</a></li>
        <li><a href="RedeemKeys.html">Redeem</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="settings.html">Settings</a></li>
      </ul>
    </nav>
  </header>
    <div class="container">
      <form action="" id="paymentForm">

        <div class="row">
          <div class="column">
            <h3>BILLING ADDRESS</h3>

            <div class="input-box">
              <span>Full Name :</span>
              <input type="text" placeholder="Sheikh Omar" id="fullName"/>
            </div>

            <div class="input-box">
              <span>Email :</span>
              <input type="email" placeholder="example@example.com" id="email"/>
            </div>

            <div class="input-box">
              <span>Address :</span>
              <input type="text" placeholder="Street Name, Building Name, Floor number" id="address"/>
            </div>

            <div class="input-box">
              <span>City :</span>
              <input type="text" placeholder="Beirut" id="city"/>
            </div>

            <div class="flex">
              <div class="input-box">
                <span>State :</span>
                <input type="text" placeholder="Mount Lebanon" id="state"/>
              </div>

              <div class="input-box">
                <span>Zip Code :</span>
                <input type="text" placeholder="0000" id="zipCode"/>
              </div>
            </div>
          </div>

          <div class="column">
            <h3>PAYMENT</h3>

             <div class="input-box">
              <span>Accepted Cards :</span>
               <div class="card-logos">
    <img src="assets/1-15923_visa-png-visa-mastercard-discover-amex-logo-transparent.webp" alt="Accepted cards">
  </div>
            </div>
            <div class="input-box">
              <span>Name On Card :</span>
              <input type="text" placeholder="Mr. Ali Ali" id="nameOnCard"/>
            </div>

            <div class="input-box">
              <span>Credit Card Number :</span>
              <input type="text" placeholder="1111 2222 3333 4444" id="cardNumber"/>
            </div>

            <div class="input-box">
              <span>Exp. Month :</span>
              <input type="text" placeholder="April" id="expMonth"/>
            </div>

            <div class="flex">
              <div class="input-box">
                <span>Exp. Year :</span>
                <input type="text" placeholder="2028" id="expYear"/>
              </div>

              <div class="input-box">
                <span>CVV :</span>
                <input type="text" placeholder="123" id="cvv"/>
              </div>
            </div>
          </div>

        </div>

        <button type="submit" class="btn">Submit</button>

      </form>
    </div>
     <footer>
    <p>&copy; 2026 LevelUp. All rights reserved.</p>
  </footer>
  <script src="GameKeys.js"></script>
    <script src="Payment.js"></script>
  </body>
</html>
