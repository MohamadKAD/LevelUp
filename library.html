<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">LevelUp</div>

  <nav>
    <ul>
     <li><a href="Home.html">Home</a></li>
        <li><a href="library.html">Library</a></li>
         <li><a href="whishList.html">Whish List</a></li>
        <li><a href="buyKeys.html">BuyKeys</a></li>
        <li><a href="RedeemKeys.html">Redeem</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="settings.html">Settings</a></li>
    </ul>
  </nav>
</header>

<section class="header">
  <h1>My Library</h1>

  <div class="top-controls">
    <input type="text" id="searchBar" placeholder="Search your games...">

    <select id="sortSelect">
      <option value="az">A to Z</option>
      <option value="za">Z to A</option>
    </select>

    <label class="favorite-filter">
      <input type="checkbox" id="favoriteOnly">
      Favorites
    </label>
  </div>
</section>

<main class="library-layout">
  <section class="library-sidebar">
    <div class="library-list-header">
      <h2>Owned Games</h2>
      <p id="libraryCount"></p>
    </div>
    <section class="library-container" id="libraryContainer"></section>
  </section>

  <aside class="library-details" id="libraryDetails">
    <div class="library-details-empty">
      <h2>Select a Game</h2>
      <p>Choose a title from the left to view its details here.</p>
    </div>
  </aside>
</main>

<script src="library.js"></script>
<script src="theme.js"></script>

</body>
</html>
