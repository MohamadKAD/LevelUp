<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            LevelUp
        </div>
    </header>

    <section class="game-details">

        <div class="G-media">
            <img src="" alt="Game Image">
            <video src=""></video>
        </div>

        <div class="game-info">
            <h1 id="GameTitle">Game Title</h1>
            <p id="GameDescription">Game Description</p>
            <h3 id="GamePrice">$0.00</h3>
            <button id="but-btn">Buy Now</button>
            <h4>Minimum Requirments</h4>
            <ul id="GameSpecific">
                <li>OS:</li>
                <li>Processor</li>
                <li>Memory:</li>
                <li>Graphics:</li>
                <li>Storage:</li>
            </ul>
        </div>
    </section>
    
    <section class="comments">
        <h2>Reviews</h2>
        <textarea id="commentInput" placeholder="Write a comment..."></textarea>
        <button id="postComment">Post</button>
        <div id="commentsList"></div>
    <div class="review">
        <div class="review-header">
            <span class="username">Player123</span>
            <span class="date">April 12, 2026</span>
            <span class="rating">★★★★☆</span>
        </div>
      <p class="review-text">Amazing gameplay and graphics, but the story pacing could be better.</p>
    </div>
    </section>
</body>
</html>
