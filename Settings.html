<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <div class="logo">LevelUp</div>

   
    <nav>
      <ul>
        <li><a href="Home.html">Home</a></li>
        <li><a href="library.html">Library</a></li>
        <li><a href="buyKeys.html">BuyKeys</a></li>
        <li><a href="RedeemKeys.html">Redeem</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="settings.html">Settings</a></li>
      </ul>
    </nav>
  </header>

  <section class="settings">
    <h1>Settings</h1>
    <div id="settings-container">
      <div class="settings-box">
        <h2>Account Settings</h2>

        <label>Username</label>
        <input type="text" id="username">

        <label>Email</label>
        <input type="email" id="email">

        <label>Password</label>
        <input type="password" id="password">
          <div class="strength-container">
            <div id="strengthBar">
              <div id="strengthBarFill"></div>
            </div>
            <small id="strengthText"></small>
          </div>

          <div class="password-rules">
            <p id="ruleLength">At least 8 characters</p>
            <p id="ruleNumber">Contains a number</p>
          </div>

        <small id="passwordError"></small>

        <button id="saveAccount">Save Changes</button>
        <small id="saveMessage"></small>
      </div>

      <div class="settings-box">
          <h2>Appearance</h2>
          <label>
              <input type="checkbox" id="themeToggle">
              Dark Mode
          </label>
      </div>
    </div>

    <div class="settings-box">
      <h2>Notifications</h2>

      <label>
        <input type="checkbox" id="emailNotif">
        Email Notifications
      </label>

      <label>
        <input type="checkbox" id="offersNotif">
        Offers & Sales Alerts
      </label>
    </div>

    <div class="settings-box">
      <h2>Privacy</h2>

      <label>
        <input type="checkbox" id="publicProfile">
        Show profile publicly
      </label>
    </div>
    
    <div class="settings-box">
      <h2>Language</h2>

      <select id="language">
        <option value="en">English</option>
      </select>
    </div>

  </section>

  <script src="settings.js"></script>
  <script src="theme.js"></script>
</body>
</html>
